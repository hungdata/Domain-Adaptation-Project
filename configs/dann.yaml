# =============================================================================
# DANN (Domain-Adversarial Neural Network)
# =============================================================================
# Loss: L = L_CE_source + λ · L_domain
# Sử dụng Gradient Reversal Layer để căn chỉnh phân phối Feature.

method: "DANN"
data_root: "./uda_fixed_folders"
output_dir: "./working"
batch_size: 64
epochs: 150
lr: 0.01
seed: 42
num_workers: 0
warmup: 10
deterministic: true
backbone: "mobilenet_v3_small"
