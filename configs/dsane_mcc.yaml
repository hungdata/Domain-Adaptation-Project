# =============================================================================
# DSAN+E+MCC (Proposed Method — Ablation)
# =============================================================================
# Loss: L = L_CE_source + λ · L_LMMD_E + λ · β · L_MCC_target
# Kết hợp LMMD có Entropy Weighting với Minimum Class Confusion (MCC)
# để giảm thiểu nhầm lẫn giữa các class trên Target domain.

method: "DSANE_MCC"
data_root: "./uda_fixed_folders"
output_dir: "./working"
batch_size: 64
epochs: 150
lr: 0.01
seed: 42
num_workers: 0
warmup: 10
deterministic: true
backbone: "mobilenet_v3_small"

# --- Tham số riêng cho MCC ---
mcc_weight: 1.0
mcc_temp: 2.5
