# =============================================================================
# DSAN+E (DSAN with Entropy Weighting)
# =============================================================================
# Loss: L = L_CE_source + λ · L_LMMD_E
# Bổ sung Entropy Weighting cho LMMD: dùng trọng số entropy của Target
# để cải thiện chất lượng pseudo-label khi tính LMMD.

method: "DSANE"
data_root: "./uda_fixed_folders"
output_dir: "./working"
batch_size: 64
epochs: 150
lr: 0.01
seed: 42
num_workers: 0
warmup: 10
deterministic: true
backbone: "mobilenet_v3_small"
