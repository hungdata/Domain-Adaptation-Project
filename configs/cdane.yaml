# =============================================================================
# CDAN+E (CDAN with Entropy Conditioning)
# =============================================================================
# Loss: L = L_CE_source + λ · L_CDAN_E
# Bổ sung Entropy Weighting cho CDAN: sample nào Target có entropy thấp
# (tức confident) sẽ được tăng trọng số trong Domain Loss.

method: "CDANE"
data_root: "./uda_fixed_folders"
output_dir: "./working"
batch_size: 64
epochs: 150
lr: 0.01
seed: 42
num_workers: 0
warmup: 10
deterministic: true
backbone: "mobilenet_v3_small"
